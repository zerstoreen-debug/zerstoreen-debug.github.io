<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Simulador P2P Crypto PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
 background:#121212;
 color:#fff;
 font-family:Arial;
}

.container {
 max-width:1100px;
 margin:auto;
 padding:20px;
 background:#1e1e1e;
 border-radius:15px;
}

h1 {
 text-align:center;
 color:#00ffff;
 margin-bottom:20px;
}

/* BOTONES */
.toggle {
 display:flex;
 justify-content:center;
 gap:10px;
 margin-bottom:20px;
}

.toggle button {
 padding:10px 20px;
 border:none;
 border-radius:10px;
 background:#333;
 color:white;
 cursor:pointer;
}

.toggle .active {
 background:#00ffff;
 color:#000;
}

/* SLIDERS */
.slider-group {
 margin-bottom:20px;
}

label {
 font-weight:bold;
}

.valores {
 text-align:right;
 color:#aaa;
 font-size:14px;
}

/* SLIDER PRO ANIMADO */
input[type=range] {
 -webkit-appearance:none;
 width:100%;
 height:12px;
 border-radius:10px;
 outline:none;
 margin-top:10px;
 background:#333;
}

/* TRACK DINÁMICO */
input[type=range]::-webkit-slider-runnable-track {
 height:12px;
 border-radius:10px;
 background: var(--track-color, #00ffff);
}

/* THUMB */
input[type=range]::-webkit-slider-thumb {
 -webkit-appearance:none;
 width:22px;
 height:22px;
 border-radius:50%;
 background:#fff;
 cursor:pointer;
 margin-top:-5px;
 box-shadow:0 0 10px rgba(0,255,255,0.8);
 transition:0.2s;
}

input[type=range]:hover::-webkit-slider-thumb {
 transform:scale(1.2);
}

/* RESULTADO */
.resultado {
 margin-top:25px;
 padding:15px;
 border-radius:10px;
 text-align:left;
 line-height:1.6;
}

.ganancia { background:#28a745; }
.perdida { background:#dc3545; }

/* BOTONES RESULTADO */
.res-toggle button {
 margin-right:5px;
 padding:5px 10px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 background:#444;
 color:white;
}

/* BOTÓN BINANCE */
#actualizarPrecio {
 margin:25px 0;
 padding:12px;
 width:100%;
 border:none;
 border-radius:10px;
 background:#ff9800;
 font-weight:bold;
 cursor:pointer;
}

/* GRÁFICA */
canvas {
 margin-top:20px;
 background:#222;
 border-radius:10px;
 padding:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Simulador P2P Crypto PRO</h1>

<div class="toggle">
<button id="copBtn" class="active">COP</button>
<button id="usdBtn">USD</button>
</div>

<div class="slider-group">
<label>Capital</label>
<input type="range" id="capital" min="10000" max="37000000" value="100000">
<div class="valores" id="capitalVal"></div>
</div>

<div class="slider-group">
<label>Ciclos</label>
<input type="range" id="ciclos" min="1" max="10" value="3">
<div class="valores" id="ciclosVal"></div>
</div>

<div class="slider-group">
<label>Compra</label>
<input type="range" id="compra" min="3000" max="6000" value="4500">
<div class="valores" id="compraVal"></div>
</div>

<div class="slider-group">
<label>Venta</label>
<input type="range" id="venta" min="3000" max="6000" value="4600">
<div class="valores" id="ventaVal"></div>
</div>

<div id="resultado" class="resultado">
<div id="resValores"></div>
<div class="res-toggle">
<button id="resCop">COP</button>
<button id="resUsd">USD</button>
</div>
</div>

<button id="actualizarPrecio">🚀 Ganar dinero en Binance</button>

<canvas id="grafica"></canvas>

</div>

<script>

let mostrarCOP=true;

const capital=document.getElementById("capital");
const ciclos=document.getElementById("ciclos");
const compra=document.getElementById("compra");
const venta=document.getElementById("venta");

const capitalVal=document.getElementById("capitalVal");
const ciclosVal=document.getElementById("ciclosVal");
const compraVal=document.getElementById("compraVal");
const ventaVal=document.getElementById("ventaVal");

const resValores=document.getElementById("resValores");
const resultado=document.getElementById("resultado");

// GRÁFICA HORIZONTAL APILADA
let chart=new Chart(document.getElementById("grafica"),{
 type:'bar',
 data:{
  labels:["Resultado"],
  datasets:[
   {data:[0]},
   {data:[0]}
  ]
 },
 options:{
  indexAxis:'y',
  scales:{x:{stacked:true},y:{stacked:true}},
  plugins:{legend:{display:false}}
 }
});

// ANIMACIÓN SLIDER (relleno dinámico)
function pintarSlider(slider){
 let val=(slider.value-slider.min)/(slider.max-slider.min)*100;
 let color=`linear-gradient(to right,#00ffff ${val}%,#333 ${val}%)`;
 slider.style.setProperty('--track-color',color);
}

function actualizar(){
 capitalVal.innerText=Number(capital.value).toLocaleString()+" COP";
 ciclosVal.innerText=ciclos.value;
 compraVal.innerText=Number(compra.value).toLocaleString();
 ventaVal.innerText=Number(venta.value).toLocaleString();

 [capital,ciclos,compra,venta].forEach(pintarSlider);
}

function calcular(){

 let usdt=capital.value/compra.value;
 let total=usdt;

 for(let i=0;i<ciclos.value;i++){
  total+=usdt*venta.value/compra.value-usdt;
  total*=0.996;
 }

 let gan=total-usdt;
 let porcentaje=(gan/usdt*100).toFixed(2);

 let inv=usdt;
 let g=gan;
 let suf="USDT";

 if(mostrarCOP){
  inv=usdt*compra.value;
  g=gan*compra.value;
  total*=compra.value;
  suf="COP";
 }

 resultado.className="resultado "+(gan>=0?"ganancia":"perdida");

 resValores.innerHTML=`
 <strong>💰 Resultado final:</strong> ${total.toFixed(2)} ${suf}<br>
 <strong>📊 Inversión inicial:</strong> ${inv.toFixed(2)} ${suf}<br>
 <strong>🚀 Ganancia:</strong> ${g.toFixed(2)} ${suf} (${porcentaje}%)
 `;

 chart.data.datasets[0].data=[inv];
 chart.data.datasets[1].data=[g];
 chart.update();
}

// EVENTOS
[capital,ciclos,compra,venta].forEach(e=>{
 e.oninput=()=>{actualizar();calcular();}
});

document.getElementById("copBtn").onclick=()=>{mostrarCOP=true;calcular();}
document.getElementById("usdBtn").onclick=()=>{mostrarCOP=false;calcular();}
document.getElementById("resCop").onclick=()=>{mostrarCOP=true;calcular();}
document.getElementById("resUsd").onclick=()=>{mostrarCOP=false;calcular();}

document.getElementById("actualizarPrecio").onclick=()=>{
 window.open("https://www.binance.com/referral/earn-together/refer2earn-usdc/claim?hl=es-LA&ref=GRO_28502_JI900&utm_source=default","_blank");
};

actualizar();
calcular();

</script>

</body>
</html>
