<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador P2P Crypto PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #f5f5f5; margin: 0; padding: 0;}
        .container { max-width: 900px; margin: 20px auto; padding: 20px; background: #1e1e1e; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5);}
        h1 { text-align: center; color: #00ffff; margin-bottom: 20px;}
        .slider-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold;}
        input[type=range] { width: 100%; }
        .valores { text-align: center; margin-top: 5px; }
        .resultado { text-align: center; font-size: 18px; padding: 15px; border-radius: 10px; margin-top: 20px;}
        .ganancia { background: #28a745; color: #ffffff; }
        .perdida { background: #dc3545; color: #ffffff; }
        .toggle { display: flex; justify-content: center; margin: 10px 0; }
        .toggle button { margin: 0 10px; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size:16px; color:#f5f5f5; background:#333; transition:0.2s;}
        .toggle button.active { background: #00ffff; color:#121212; }
        #actualizarPrecio { display: block; margin: 20px auto; padding: 12px 25px; background: #ff9800; color:black; border:none; border-radius:10px; cursor:pointer; font-size:16px;}
        canvas { margin-top: 20px; background:#222; border-radius:10px; padding:10px; }
        .ads { text-align:center; margin:20px 0; color:#999; }
        .res-toggle button { margin: 5px; padding:5px 10px; border:none; border-radius:8px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simulador P2P Crypto PRO</h1>

        <!-- Toggle COP/USD -->
        <div class="toggle">
            <button id="copBtn" class="active">COP</button>
            <button id="usdBtn">USD</button>
        </div>

        <!-- Sliders -->
        <div class="slider-group">
            <label for="capital">Capital inicial (COP)</label>
            <input type="range" id="capital" min="50000" max="10000000" step="1" value="10000">
            <div class="valores" id="capitalVal">500,000 COP</div>
        </div>

        <div class="slider-group">
            <label for="ciclos">Ciclos de compra/venta</label>
            <input type="range" id="ciclos" min="1" max="10" step="1" value="3">
            <div class="valores" id="ciclosVal">3</div>
        </div>

        <div class="slider-group">
            <label for="precioCompra">Precio de compra USDT</label>
            <input type="range" id="precioCompra" min="3000" max="6000" step="10" value="4500">
            <div class="valores" id="precioCompraVal">4,500 COP</div>
        </div>

        <div class="slider-group">
            <label for="precioVenta">Precio de venta USDT</label>
            <input type="range" id="precioVenta" min="3000" max="6000" step="10" value="4600">
            <div class="valores" id="precioVentaVal">4,600 COP</div>
        </div>

        <!-- Resultado con toggle de moneda -->
        <div id="resultado" class="resultado">
            <div id="resValores"></div>
            <div class="res-toggle">
                <button id="resCop">COP</button>
                <button id="resUsd">USD</button>
            </div>
        </div>

        <!-- Botón actualizar precio real + afiliado -->
        <button id="actualizarPrecio">Actualizar precio real y usar mi enlace</button>

        <!-- Gráfica apilada -->
        <canvas id="grafica"></canvas>

        <!-- Espacios para AdSense -->
        <div class="ads">
            <p>Publicidad</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Sliders y valores
        const capitalSlider = document.getElementById("capital");
        const ciclosSlider = document.getElementById("ciclos");
        const precioCompraSlider = document.getElementById("precioCompra");
        const precioVentaSlider = document.getElementById("precioVenta");

        const capitalVal = document.getElementById("capitalVal");
        const ciclosVal = document.getElementById("ciclosVal");
        const precioCompraVal = document.getElementById("precioCompraVal");
        const precioVentaVal = document.getElementById("precioVentaVal");

        const resultado = document.getElementById("resultado");
        const resValores = document.getElementById("resValores");

        const chartCtx = document.getElementById("grafica").getContext('2d');
        let chart = new Chart(chartCtx, {
            type: 'bar',
            data: {
                labels: ['Inversión + Ganancia'],
                datasets: [
                    { label: 'Inversión Inicial', data: [0], backgroundColor: '#00ffff' },
                    { label: 'Ganancia Neta', data: [0], backgroundColor: '#ff9800' }
                ]
            },
            options: {
                responsive:true,
                plugins: { legend:{ position:'top' } },
                scales: { x:{ stacked:true }, y:{ stacked:true, beginAtZero:true } }
            }
        });

        // Toggle principal COP/USD
        const copBtn = document.getElementById("copBtn");
        const usdBtn = document.getElementById("usdBtn");

        let monedaPrincipal = "COP";
        let mostrarEnCOP = true;

        function actualizarValores() {
            capitalVal.innerText = parseInt(capitalSlider.value).toLocaleString() + " COP";
            ciclosVal.innerText = ciclosSlider.value;
            if(monedaPrincipal=="USD"){
                precioCompraVal.innerText = parseFloat(precioCompraSlider.value).toFixed(3) + " USD";
                precioVentaVal.innerText = parseFloat(precioVentaSlider.value).toFixed(3) + " USD";
            } else {
                precioCompraVal.innerText = parseInt(precioCompraSlider.value).toLocaleString() + " COP";
                precioVentaVal.innerText = parseInt(precioVentaSlider.value).toLocaleString() + " COP";
            }
        }

        function calcularResultado() {
            let capital = parseFloat(capitalSlider.value);
            let ciclos = parseInt(ciclosSlider.value);
            let precioCompra = parseFloat(precioCompraSlider.value);
            let precioVenta = parseFloat(precioVentaSlider.value);

            let cantidadInicialUsdt = capital / precioCompra;
            let valorBruto = cantidadInicialUsdt;

            for(let i=0; i<ciclos; i++){
                valorBruto += cantidadInicialUsdt * precioVenta / precioCompra - cantidadInicialUsdt;
                valorBruto *= 0.996; // 4x1000
            }

            let ganancia = valorBruto - cantidadInicialUsdt;
            let porcentaje = (ganancia / cantidadInicialUsdt * 100).toFixed(2);

            let invMostrar = cantidadInicialUsdt;
            let gananciaMostrar = ganancia;
            let sufijo = "USDT";

            if(mostrarEnCOP){
                invMostrar = cantidadInicialUsdt * precioCompra;
                gananciaMostrar = ganancia * precioCompra;
                sufijo = "COP";
            }

            resultado.className = "resultado " + (ganancia>=0?"ganancia":"perdida");
            resValores.innerHTML = `
                💰 Final: ${(valorBruto*(mostrarEnCOP?precioCompra:1)).toFixed(2)} ${sufijo} <br>
                📊 Inicio: ${invMostrar.toFixed(2)} ${sufijo} <br>
                🚀 Ganancia: ${gananciaMostrar.toFixed(2)} ${sufijo} (${porcentaje}%)
            `;

            chart.data.datasets[0].data = [invMostrar.toFixed(2)];
            chart.data.datasets[1].data = [gananciaMostrar.toFixed(2)];
            chart.update();
        }

        [capitalSlider, ciclosSlider, precioCompraSlider, precioVentaSlider].forEach(slider=>{
            slider.addEventListener("input", ()=>{
                actualizarValores();
                calcularResultado();
            });
        });

        // Toggle COP/USD principal
        copBtn.addEventListener("click", ()=>{
            monedaPrincipal="COP";
            mostrarEnCOP = true;
            precioCompraSlider.min=3000; precioCompraSlider.max=6000; precioCompraSlider.step=10;
            precioVentaSlider.min=3000; precioVentaSlider.max=6000; precioVentaSlider.step=10;
            actualizarValores();
            calcularResultado();
        });

        usdBtn.addEventListener("click", ()=>{
            monedaPrincipal="USD";
            mostrarEnCOP=false;
            precioCompraSlider.min=0.99; precioCompraSlider.max=1.199; precioCompraSlider.step=0.001;
            precioVentaSlider.min=0.99; precioVentaSlider.max=1.199; precioVentaSlider.step=0.001;
            actualizarValores();
            calcularResultado();
        });

        // Toggle en el recuadro de resultado
        document.getElementById("resCop").addEventListener("click", ()=>{
            mostrarEnCOP=true;
            calcularResultado();
        });
        document.getElementById("resUsd").addEventListener("click", ()=>{
            mostrarEnCOP=false;
            calcularResultado();
        });

        // Botón actualizar precio real + link afiliado
        document.getElementById("actualizarPrecio").addEventListener("click", async ()=>{
            try{
                const response = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=USDTCOP");
                const data = await response.json();
                const precioReal = parseFloat(data.price);
                precioCompraSlider.value = precioReal;
                precioVentaSlider.value = precioReal*1.01;
                actualizarValores();
                calcularResultado();
                window.open("TU_LINK_DE_AFILIADO_AQUI","_blank");
            } catch(e){
                alert("No se pudo actualizar el precio real de Binance.");
            }
        });

        actualizarValores();
        calcularResultado();
    </script>
</body>
</html>
