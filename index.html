<meta charset="UTF-8">
<title>Simulador P2P Crypto PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial, sans-serif; background: #121212; color: #f5f5f5; margin: 0; padding: 0;}

.container {
 max-width: 900px;
 margin: 20px auto;
 padding: 20px;
 background: #1e1e1e;
 border-radius: 15px;
 box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

h1 {
 text-align: center;
 color: #00ffff;
 margin-bottom: 20px;
}

.toggle { display: flex; justify-content: center; margin: 15px 0; }

.toggle button {
 margin: 0 10px;
 padding: 12px 25px;
 border: none;
 border-radius: 10px;
 cursor: pointer;
 font-weight: bold;
 font-size:16px;
 background:#333;
 color:white;
 transition:0.3s;
}

.toggle button.active {
 background: #00ffff;
 color:#121212;
}

.slider-group {
 margin: 20px 0;
}

label {
 display: block;
 margin-bottom: 5px;
 font-weight: bold;
}

input[type=range] {
 width: 100%;
}

.valores {
 text-align: center;
 margin-top: 5px;
 font-size: 14px;
 color:#ccc;
}

.resultado {
 text-align: center;
 font-size: 18px;
 padding: 15px;
 border-radius: 10px;
 margin-top: 20px;
 transition:0.3s;
}

.ganancia { background: #28a745; }
.perdida { background: #dc3545; }

#actualizarPrecio {
 display: block;
 margin: 25px auto;
 padding: 14px 25px;
 border: none;
 border-radius: 10px;
 cursor: pointer;
 font-size:16px;
 font-weight:bold;
 background:#ff9800;
 color:black;
 transition:0.3s;
}

#actualizarPrecio:hover {
 transform: scale(1.05);
}

canvas {
 margin-top: 20px;
 background:#222;
 border-radius:10px;
 padding:10px;
}

.ads {
 text-align:center;
 margin:30px 0;
 color:#999;
}
</style>

</head>

<body>

<!-- Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PKMVR789"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="container">

<h1>Simulador P2P Crypto PRO</h1>

<div class="toggle">
<button id="copBtn" class="active">COP</button>
<button id="usdBtn">USD</button>
</div>

<div class="slider-group">
<label>Capital inicial</label>
<input type="range" id="capital" min="50000" max="100000000" step="1000" value="500000">
<div class="valores" id="capitalVal"></div>
</div>

<div class="slider-group">
<label>Ciclos</label>
<input type="range" id="ciclos" min="1" max="10" value="3">
<div class="valores" id="ciclosVal"></div>
</div>

<div class="slider-group">
<label>Precio compra USDT</label>
<input type="range" id="precioCompra" min="3000" max="6000" step="10" value="4500">
<div class="valores" id="precioCompraVal"></div>
</div>

<div class="slider-group">
<label>Precio venta USDT</label>
<input type="range" id="precioVenta" min="3000" max="6000" step="10" value="4600">
<div class="valores" id="precioVentaVal"></div>
</div>

<div id="resultado" class="resultado"></div>

<button id="actualizarPrecio">🚀 Ganar dinero en Binance</button>

<canvas id="grafica"></canvas>

<div class="ads">Publicidad</div>

</div>

<script>

// (MISMO JS FUNCIONAL QUE YA TENÍAS PERO LIMPIO)

const capitalSlider = document.getElementById("capital");
const ciclosSlider = document.getElementById("ciclos");
const precioCompraSlider = document.getElementById("precioCompra");
const precioVentaSlider = document.getElementById("precioVenta");

const capitalVal = document.getElementById("capitalVal");
const ciclosVal = document.getElementById("ciclosVal");
const precioCompraVal = document.getElementById("precioCompraVal");
const precioVentaVal = document.getElementById("precioVentaVal");

const resultado = document.getElementById("resultado");

let chart = new Chart(document.getElementById("grafica"), {
 type:'bar',
 data:{
  labels:["Inicio","Final"],
  datasets:[{data:[0,0], backgroundColor:["#00ffff","#ff9800"]}]
 },
 options:{responsive:true, plugins:{legend:{display:false}}}
});

function actualizarValores(){
 capitalVal.innerText = Number(capitalSlider.value).toLocaleString()+" COP";
 ciclosVal.innerText = ciclosSlider.value;
 precioCompraVal.innerText = Number(precioCompraSlider.value).toLocaleString()+" COP";
 precioVentaVal.innerText = Number(precioVentaSlider.value).toLocaleString()+" COP";
}

function calcular(){
 let capital=capitalSlider.value;
 let compra=precioCompraSlider.value;
 let venta=precioVentaSlider.value;
 let ciclos=ciclosSlider.value;

 let usdt=capital/compra;
 let total=usdt;

 for(let i=0;i<ciclos;i++){
  total += usdt*venta/compra - usdt;
  total*=0.996;
 }

 let gan=total-usdt;

 resultado.className="resultado "+(gan>=0?"ganancia":"perdida");

 resultado.innerHTML=`
 💰 Final: ${total.toFixed(2)} USDT<br>
 📊 Inicio: ${usdt.toFixed(2)} USDT<br>
 🚀 Ganancia: ${gan.toFixed(2)} USDT
 `;

 chart.data.datasets[0].data=[usdt,total];
 chart.update();
}

[capitalSlider,ciclosSlider,precioCompraSlider,precioVentaSlider].forEach(e=>{
 e.addEventListener("input",()=>{actualizarValores();calcular();});
});

actualizarValores();
calcular();

document.getElementById("actualizarPrecio").onclick=()=>{
 window.open("https://www.binance.com/","_blank");
};

</script>

</body>
</html>
